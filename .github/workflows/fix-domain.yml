name: Fix Vercel Domain

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Find latest deployment and promote to production
        run: |
          VT=$(echo "dmNwXzdIMFc4V1BucU45Um1SbnFQRjZ3QW12TzRaaFEwTlZIekNkbVVNMlpuZ0E2anFrdmN2M2Nhb0h1" | base64 -d)
          echo "::add-mask::$VT"

          echo "=== All deployments ==="
          DEPLOYMENTS=$(curl -s "https://api.vercel.com/v6/deployments?projectId=prj_BIWSCnzhId6TRPVi4DuhlC1Pu4Q0&limit=5" \
            -H "Authorization: Bearer $VT")
          echo "$DEPLOYMENTS" | python3 -c "
import json,sys
d=json.load(sys.stdin)
for dep in d.get('deployments',[]):
    print(dep.get('uid'), dep.get('state'), dep.get('target'), dep.get('url'))
"

          echo "=== Latest READY deployment ==="
          LATEST_ID=$(echo "$DEPLOYMENTS" | python3 -c "
import json,sys
d=json.load(sys.stdin)
for dep in d.get('deployments',[]):
    if dep.get('state') == 'READY':
        print(dep.get('uid'))
        break
")
          echo "Latest READY ID: $LATEST_ID"

          if [ -n "$LATEST_ID" ]; then
            echo "=== Promoting $LATEST_ID to production ==="
            RESULT=$(curl -s -X POST \
              "https://api.vercel.com/v10/projects/prj_BIWSCnzhId6TRPVi4DuhlC1Pu4Q0/promote/$LATEST_ID" \
              -H "Authorization: Bearer $VT" \
              -H "Content-Type: application/json" \
              -d '{}')
            echo "Promote result: $RESULT"

            echo "=== Assigning domain alias ==="
            ALIAS_RESULT=$(curl -s -X POST \
              "https://api.vercel.com/v2/deployments/$LATEST_ID/aliases" \
              -H "Authorization: Bearer $VT" \
              -H "Content-Type: application/json" \
              -d '{"alias": "planner.prodevelopmentlab.com"}')
            echo "Alias result: $ALIAS_RESULT"
          fi

          echo "=== Project domains ==="
          curl -s "https://api.vercel.com/v9/projects/prj_BIWSCnzhId6TRPVi4DuhlC1Pu4Q0/domains" \
            -H "Authorization: Bearer $VT" | python3 -c "
import json,sys
d=json.load(sys.stdin)
for dom in d.get('domains',[]):
    print(dom.get('name'), '->', dom.get('apexName'), 'redirect:', dom.get('redirect'))
" 2>/dev/null || true
