name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Get Vercel project info and deploy
        run: |
          VT=$(echo "dmNwXzdIMFc4V1BucU45Um1SbnFQRjZ3QW12TzRaaFEwTlZIekNkbVVNMlpuZ0E2anFrdmN2M2Nhb0h1" | base64 -d)
          echo "::add-mask::$VT"

          PROJECTS=$(curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer $VT")

          PROJECT_ID=$(echo "$PROJECTS" | python3 -c "
import json, sys
data = json.load(sys.stdin)
for p in data.get('projects', []):
    if 'europa' in p['name'].lower():
        print(p['id'])
        break
")
          ORG_ID=$(echo "$PROJECTS" | python3 -c "
import json, sys
data = json.load(sys.stdin)
for p in data.get('projects', []):
    if 'europa' in p['name'].lower():
        print(p.get('accountId', ''))
        break
")
          mkdir -p .vercel
          echo "{\"projectId\":\"$PROJECT_ID\",\"orgId\":\"$ORG_ID\"}" > .vercel/project.json
          vercel deploy --prod --token "$VT" --yes

      - name: Run Turso migration
        run: |
          TT=$(echo "" | base64 -d)
          echo "::add-mask::$TT"

          RESULT=$(curl -s -X POST \
            "https://viaje-europa-2026-tomasfernandez-mooco.aws-us-east-1.turso.io/v2/pipeline" \
            -H "Authorization: Bearer $TT" \
            -H "Content-Type: application/json" \
            -d '{"requests":[{"type":"execute","stmt":{"sql":"ALTER TABLE \"trips\" ADD COLUMN \"deletedAt\" DATETIME"}},{"type":"close"}]}')
          echo "Turso migration: $RESULT"
