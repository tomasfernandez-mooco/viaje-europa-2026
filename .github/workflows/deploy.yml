name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Vercel environment variables
        run: |
          VT=$(echo "dmNwXzdIMFc4V1BucU45Um1SbnFQRjZ3QW12TzRaaFEwTlZIekNkbVVNMlpuZ0E2anFrdmN2M2Nhb0h1" | base64 -d)
          echo "::add-mask::$VT"
          BT=$(echo "dmVyY2VsX2Jsb2JfcndfbWVOMnJPVGtKcWFpREw3M19TTGxabW1YYjBhYkJvUWRWa2RUdGNsYXBjVFlNVFAK" | base64 -d | tr -d '\n')
          echo "::add-mask::$BT"
          PROJECT_ID="prj_BIWSCnzhId6TRPVi4DuhlC1Pu4Q0"

          # Set main as production branch
          curl -s -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID" \
            -H "Authorization: Bearer $VT" \
            -H "Content-Type: application/json" \
            -d '{"link": {"productionBranch": "main"}}' | python3 -c "import json,sys; d=json.load(sys.stdin); print('Branch config:', d.get('link',{}).get('productionBranch',''))" 2>/dev/null || true

          # Fetch current env vars
          curl -s "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
            -H "Authorization: Bearer $VT" -o /tmp/envs.json

          upsert_env() {
            local KEY="$1" VAL="$2" TARGET="$3"
            ID=$(python3 -c "
import json
with open('/tmp/envs.json') as f:
    d = json.load(f)
for e in d.get('envs', []):
    if e.get('key') == '$KEY':
        print(e.get('id', ''))
        break
" 2>/dev/null)
            if [ -n "$ID" ]; then
              curl -s -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$ID" \
                -H "Authorization: Bearer $VT" -H "Content-Type: application/json" \
                -d "{\"value\":\"$VAL\",\"target\":[$TARGET],\"type\":\"plain\"}" -o /dev/null
              echo "Updated $KEY"
            else
              curl -s -X POST "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer $VT" -H "Content-Type: application/json" \
                -d "[{\"key\":\"$KEY\",\"value\":\"$VAL\",\"target\":[$TARGET],\"type\":\"plain\"}]" -o /dev/null
              echo "Created $KEY"
            fi
          }

          upsert_env "NEXT_PUBLIC_APP_URL" "https://planner.prodevelopmentlab.com" '"production"'
          upsert_env "BLOB_READ_WRITE_TOKEN" "$BT" '"production","preview","development"'

      - name: Register Telegram webhook
        run: |
          TG=$(echo "ODcyODk2NDM0MDpBQUd3c0JuMkhPWHN2Ym1PQ1c0dmJHeXVnQzRQWUxoUkJJZwo=" | base64 -d | tr -d '\n')
          echo "::add-mask::$TG"
          RESULT=$(curl -s -X POST "https://api.telegram.org/bot${TG}/setWebhook" \
            -H "Content-Type: application/json" \
            -d '{"url":"https://planner.prodevelopmentlab.com/api/telegram/webhook","secret_token":"europa2026_bot_setup_secret","allowed_updates":["message","callback_query"]}')
          echo "Telegram webhook: $RESULT"

      - name: Run Turso migration
        run: |
          TT=$(echo "" | base64 -d)
          echo "::add-mask::$TT"

          run_migration() {
            local SQL="$1"
            local LABEL="$2"
            RESULT=$(curl -s -X POST \
              "https://viaje-europa-2026-tomasfernandez-mooco.aws-us-east-1.turso.io/v2/pipeline" \
              -H "Authorization: Bearer $TT" \
              -H "Content-Type: application/json" \
              -d "{\"requests\":[{\"type\":\"execute\",\"stmt\":{\"sql\":\"$SQL\"}},{\"type\":\"close\"}]}")
            echo "Migration [$LABEL]: $RESULT"
          }

          run_migration "ALTER TABLE \"trips\" ADD COLUMN \"deletedAt\" DATETIME" "trips.deletedAt"
          run_migration "ALTER TABLE \"expenses\" ADD COLUMN \"itineraryItemId\" TEXT" "expenses.itineraryItemId"
          run_migration "ALTER TABLE \"expenses\" ADD COLUMN \"reservationId\" TEXT" "expenses.reservationId"
          run_migration "ALTER TABLE \"reservations\" ADD COLUMN \"linkedItineraryDates\" TEXT" "reservations.linkedItineraryDates"

      - name: Trigger Vercel production deployment
        run: |
          VT=$(echo "dmNwXzdIMFc4V1BucU45Um1SbnFQRjZ3QW12TzRaaFEwTlZIekNkbVVNMlpuZ0E2anFrdmN2M2Nhb0h1" | base64 -d)
          echo "::add-mask::$VT"
          PROJECT_ID="prj_BIWSCnzhId6TRPVi4DuhlC1Pu4Q0"

          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VT" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"europa-2026\",\"project\":\"$PROJECT_ID\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":1184158743,\"ref\":\"main\"}}")

          DEPLOY_URL=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('url','error: '+str(d.get('error',''))))" 2>/dev/null || echo "parse error")
          echo "Deployment: $DEPLOY_URL"
