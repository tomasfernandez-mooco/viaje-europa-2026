name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy and fix domain
        run: |
          VT=$(echo "dmNwXzdIMFc4V1BucU45Um1SbnFQRjZ3QW12TzRaaFEwTlZIekNkbVVNMlpuZ0E2anFrdmN2M2Nhb0h1" | base64 -d)
          echo "::add-mask::$VT"
          PROJECT_ID="prj_BIWSCnzhId6TRPVi4DuhlC1Pu4Q0"
          DOMAIN="planner.prodevelopmentlab.com"

          # 1. Set main as production branch
          echo "--- Setting production branch ---"
          curl -s -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID" \
            -H "Authorization: Bearer $VT" \
            -H "Content-Type: application/json" \
            -d '{"link":{"productionBranch":"main"}}' | python3 -c "import json,sys; d=json.load(sys.stdin); print('productionBranch:', d.get('link',{}).get('productionBranch',''))" 2>/dev/null || true

          # 2. Create production deployment from git
          echo "--- Creating deployment ---"
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VT" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"europa-2026\",\"project\":\"$PROJECT_ID\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":1184158743,\"ref\":\"main\"}}")
          echo "Create response: $RESPONSE"

          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id','') or d.get('uid',''))" 2>/dev/null)
          echo "Deployment ID: $DEPLOY_ID"

          # 3. Wait for deployment to be READY (max 10 min)
          if [ -n "$DEPLOY_ID" ]; then
            echo "--- Waiting for deployment to be READY ---"
            for i in $(seq 1 30); do
              STATUS=$(curl -s "https://api.vercel.com/v13/deployments/$DEPLOY_ID" \
                -H "Authorization: Bearer $VT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('readyState','UNKNOWN'))" 2>/dev/null)
              echo "Status ($i): $STATUS"
              if [ "$STATUS" = "READY" ] || [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
                break
              fi
              sleep 20
            done

            # 4. Assign domain alias to this deployment
            if [ "$STATUS" = "READY" ]; then
              echo "--- Assigning domain $DOMAIN ---"
              curl -s -X POST "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases" \
                -H "Authorization: Bearer $VT" \
                -H "Content-Type: application/json" \
                -d "{\"alias\":\"$DOMAIN\"}" | python3 -c "import json,sys; d=json.load(sys.stdin); print('Alias:', d.get('alias',''), d.get('error',''))" 2>/dev/null
            else
              echo "Deployment not READY (status=$STATUS), skipping alias"
              exit 1
            fi
          fi

      - name: Run Turso migration
        run: |
          TT=$(echo "" | base64 -d)
          echo "::add-mask::$TT"
          RESULT=$(curl -s -X POST \
            "https://viaje-europa-2026-tomasfernandez-mooco.aws-us-east-1.turso.io/v2/pipeline" \
            -H "Authorization: Bearer $TT" \
            -H "Content-Type: application/json" \
            -d '{"requests":[{"type":"execute","stmt":{"sql":"ALTER TABLE \"trips\" ADD COLUMN \"deletedAt\" DATETIME"}},{"type":"close"}]}')
          echo "Turso migration: $RESULT"
